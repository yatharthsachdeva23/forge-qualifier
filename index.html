<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Sprint - AI Web Scraper Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 50%, #111827 0%, #030712 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px rgba(255, 255, 255, 0.08) solid;
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 p-6 md:p-12 flex flex-col justify-between">
    <header class="max-w-6xl mx-auto w-full mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <span class="text-xs uppercase tracking-widest text-emerald-400 font-bold">Forge Qualifier E2E Loop</span>
            <h1 class="text-3xl md:text-5xl font-extrabold bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">
                Scraper Dashboard
            </h1>
        </div>
        <div class="glass px-4 py-2 rounded-full text-xs font-semibold text-emerald-300 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
            System Live & Connected
        </div>
    </header>

    <main class="max-w-6xl mx-auto w-full flex-grow">
        <section id="stats-section" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- Stats will load here -->
        </section>

        <section id="results-section" class="grid grid-cols-1 gap-8">
            <div class="glass p-8 rounded-2xl animate-pulse text-center text-slate-400">
                Loading Scrape Results...
            </div>
        </section>
    </main>

    <footer class="max-w-6xl mx-auto w-full text-center mt-12 text-xs text-slate-500 border-t border-slate-800 pt-6">
        Forge Qualifier Submission &middot; Designed by Yatharth Sachdeva
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('./scrape_results.json');
                const data = await response.json();
                
                // Load stats
                const statsSection = document.getElementById('stats-section');
                statsSection.innerHTML = `
                    <div class="glass p-6 rounded-2xl">
                        <p class="text-slate-400 text-sm">Target Domains</p>
                        <p class="text-3xl font-extrabold text-white mt-1">${data.length}</p>
                    </div>
                    <div class="glass p-6 rounded-2xl">
                        <p class="text-slate-400 text-sm">Total Headings Captured</p>
                        <p class="text-3xl font-extrabold text-indigo-400 mt-1">
                            ${data.reduce((acc, curr) => acc + (curr.headings ? curr.headings.length : 0), 0)}
                        </p>
                    </div>
                    <div class="glass p-6 rounded-2xl">
                        <p class="text-slate-400 text-sm">Status</p>
                        <p class="text-3xl font-extrabold text-emerald-400 mt-1">Ready</p>
                    </div>
                `;

                // Load results
                const resultsSection = document.getElementById('results-section');
                resultsSection.innerHTML = data.map((site, index) => {
                    const headingsHtml = site.headings && site.headings.length > 0
                        ? site.headings.map(h => `
                            <div class="flex items-center gap-3 bg-white/5 px-4 py-2 rounded-lg text-sm">
                                <span class="text-xs uppercase bg-indigo-500/20 text-indigo-300 px-2 py-0.5 rounded font-bold">${h.tag}</span>
                                <span class="text-slate-300">${h.text}</span>
                            </div>
                        `).join('')
                        : `<p class="text-sm text-slate-500 italic">No headings/H1-H6 tags found on this page layout.</p>`;

                    return `
                        <div class="glass p-6 md:p-8 rounded-2xl">
                            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-2 mb-6">
                                <div>
                                    <h3 class="text-xl font-bold text-white">${site.title}</h3>
                                    <a href="${site.url}" target="_blank" class="text-xs text-indigo-400 hover:underline">${site.url}</a>
                                </div>
                                <span class="text-xs font-semibold bg-emerald-400/10 text-emerald-300 border border-emerald-500/20 px-3 py-1 rounded-full">Scraped</span>
                            </div>
                            <div class="space-y-3">
                                <h4 class="text-xs uppercase tracking-widest text-slate-400 font-bold mb-2">Captured Headings</h4>
                                ${headingsHtml}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                document.getElementById('results-section').innerHTML = `
                    <div class="glass p-8 rounded-2xl border-red-500/20 text-center text-red-400">
                        Error loading results. Make sure scrape_results.json exists.
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
