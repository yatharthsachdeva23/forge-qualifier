<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Kanban Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; }
        .kanban-column { background-color: #1e293b; min-height: 80vh; border-radius: 12px; }
        .card { background-color: #334155; transition: transform 0.1s ease, background-color 0.2s ease; cursor: pointer; }
        .card:hover { background-color: #475569; transform: translateY(-2px); }
        .overdue-badge { background-color: #ef4444; color: white; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div id="app" class="p-8 max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <h1 class="text-3xl font-bold text-white">OpenClaw Kanban</h1>
            <div id="member-avatars" class="flex -space-x-2"></div>
        </header>

        <div id="board" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Columns rendered by JS -->
        </div>
    </div>

    <script>
        // Configurable API Base URL
        const API_BASE_URL = 'http://localhost:8000/api';

        const INITIAL_MEMBERS = [
            { id: 1, name: 'Yatharth', avatar: 'https://i.pravatar.cc/150?u=1' },
            { id: 2, name: 'Alex', avatar: 'https://i.pravatar.cc/150?u=2' },
            { id: 3, name: 'Jordan', avatar: 'https://i.pravatar.cc/150?u=3' },
        ];

        const TAG_COLORS = {
            'Bug': 'bg-red-500 text-red-100',
            'Design': 'bg-purple-500 text-purple-100',
            'Feature': 'bg-green-500 text-green-100',
            'Other': 'bg-slate-500 text-slate-100'
        };

        const MOCK_TASKS = [
            { id: 't1', title: 'Setup Project Structure', desc: 'Define folder hierarchy and config', status: 'done', dueDate: '2026-06-01', memberId: 1, tag: 'Feature' },
            { id: 't2', title: 'Build API Endpoints', desc: 'Implement CRUD for tasks', status: 'doing', dueDate: '2026-06-25', memberId: 2, tag: 'Feature' },
            { id: 't3', title: 'Kanban UI Implementation', desc: 'React frontend for board', status: 'todo', dueDate: '2026-06-22', memberId: 3, tag: 'Design' },
            { id: 't4', title: 'Fix Auth Bug', desc: 'Token expiration issue', status: 'todo', dueDate: '2026-06-10', memberId: 1, tag: 'Bug' },
        ];

        const COLUMNS = [
            { id: 'todo', title: 'To-Do', color: 'bg-blue-500' },
            { id: 'doing', title: 'Doing', color: 'bg-yellow-500' },
            { id: 'done', title: 'Done', color: 'bg-green-500' },
        ];

        let tasks = [];

        async function apiFetch(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    }
                });
                if (!response.ok) throw new Error('API response not ok');
                return await response.json();
            } catch (error) {
                console.warn(`API call to ${endpoint} failed: ${error.message}. Falling back to mock data.`);
                return null;
            }
        }

        async function loadTasks() {
            const data = await apiFetch('/tasks');
            tasks = data || [...MOCK_TASKS];
            render();
        }

        async function moveTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            const nextStatus = { todo: 'doing', doing: 'done', done: 'todo' }[task.status];
            
            // Optimistic Update
            const oldStatus = task.status;
            task.status = nextStatus;
            render();

            const updated = await apiFetch(`/tasks/${taskId}`, {
                method: 'PATCH',
                body: JSON.stringify({ status: nextStatus })
            });

            if (updated === null) {
                // If API fails, we keep the optimistic change but log it. 
                // In a real app, we might revert to oldStatus.
                console.error('Failed to update task status on server.');
            }
        }

        async function addTask(title, desc, memberId, tag) {
            const newTask = { title, desc, memberId, tag, status: 'todo', dueDate: new Date().toISOString().split('T')[0] };
            const created = await apiFetch('/tasks', {
                method: 'POST',
                body: JSON.stringify(newTask)
            });

            if (created) {
                tasks.push(created);
            } else {
                const mockId = 't' + (tasks.length + 1);
                tasks.push({ ...newTask, id: mockId });
            }
            render();
        }

        function isOverdue(date) {
            return new Date(date) < new Date();
        }

        function render() {
            // Render Members
            const memberContainer = document.getElementById('member-avatars');
            memberContainer.innerHTML = INITIAL_MEMBERS.map(m => 
                `<img src="${m.avatar}" title="${m.name}" class="w-8 h-8 rounded-full border-2 border-slate-800" />`
            ).join('');

            // Render Board
            const board = document.getElementById('board');
            board.innerHTML = COLUMNS.map(col => {
                const colTasks = tasks.filter(t => t.status === col.id);
                return `
                    <div class="kanban-column p-4 flex flex-col">
                        <div class="flex items-center gap-2 mb-4">
                            <div class="w-3 h-3 rounded-full ${col.color}"></div>
                            <h2 class="text-lg font-semibold text-slate-300">${col.title}</h2>
                            <span class="ml-auto text-sm text-slate-500">${colTasks.length}</span>
                        </div>
                        <div class="space-y-3 flex-1">
                            ${colTasks.map(task => {
                                const member = INITIAL_MEMBERS.find(m => m.id === task.memberId);
                                const overdue = isOverdue(task.dueDate) && task.status !== 'done';
                                const tagColor = TAG_COLORS[task.tag] || TAG_COLORS['Other'];
                                return `
                                    <div onclick="moveTask('${task.id}')" class="card p-4 rounded-lg shadow-sm border border-slate-700 group relative">
                                        <div class="flex justify-between items-start mb-2">
                                            <div class="flex flex-col gap-2">
                                                <span class="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase w-fit ${tagColor}">
                                                    ${task.tag}
                                                </span>
                                                <h3 class="font-medium text-slate-100">${task.title}</h3>
                                            </div>
                                            ${overdue ? `<span class="overdue-badge px-2 py-0.5 rounded-full text-[10px] font-bold uppercase">Overdue</span>` : ''}
                                        </div>
                                        <p class="text-sm text-slate-400 mb-4">${task.desc}</p>
                                        <div class="flex justify-between items-center">
                                            <span class="text-xs text-slate-500">${task.dueDate}</span>
                                            <img src="${member?.avatar}" class="w-6 h-6 rounded-full" />
                                        </div>
                                        <div class="absolute right-2 top-2 opacity-0 group-hover:opacity-100 transition-opacity text-slate-500">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                                            </svg>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Initial load
        loadTasks();
    </script>
</body>
</html>
